<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PV Audio</title>
</head>
<body>
<script src="./audio.js"></script>
<script src="./hud.js"></script>
<script>
    window.addEventListener('message', function (e) {
        var d = e.data;
        var A = window.PVAudio;
        var H = window.PVHud;
        if (!A) return;
        switch (d.transactionType) {
            case 'playSound':      A.playSound(d);                          break;
            case 'startAlarm':     A.startAlarm(d);                         break;
            case 'stopAlarm':      A.stopAlarm(d.key);                       break;
            case 'updateListener': A.updateListener(d);                      break;
            case 'showLockHud':    if (H) H.show(d.locked, d.displayTime);  break;
        }
    });
</script>
</body>
</html>
